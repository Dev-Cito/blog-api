services:
  postgres:
    image: postgres:16-alpine
    container_name: blog_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: blog_db
    ports:
      - "5434:5432"
    volumes:
      - blog_postgres_data:/var/lib/postgresql/data
volumes:
  blog_postgres_data:
